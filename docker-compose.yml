version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: letterbooks_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: letterbooks
      MYSQL_USER: springuser
      MYSQL_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: letterbooks_backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/letterbooks
      SPRING_DATASOURCE_USERNAME: springuser
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Propiedades adicionales si son necesarias
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MariaDBDialect

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: letterbooks_frontend
    ports:
      - "80:80"
      - "3000:3000" # Mapeamos también el 3000 por si lo necesita Vite en preview
    depends_on:
      - backend

volumes:
  mariadb_data:
